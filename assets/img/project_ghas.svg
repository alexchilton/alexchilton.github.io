<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg_ghas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2030;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg_ghas)"/>
  <!-- Shield icon (GitHub Advanced Security) -->
  <path d="M120,40 L200,40 L200,140 Q200,190 160,210 Q120,190 120,140 Z" fill="#1a2030" stroke="#f0883e" stroke-width="2.5" opacity="0.9"/>
  <text x="160" y="100" font-family="monospace" font-size="22" fill="#f0883e" text-anchor="middle" font-weight="bold">GH</text>
  <text x="160" y="122" font-family="monospace" font-size="13" fill="#f0883e" text-anchor="middle">500</text>
  <!-- CodeQL label -->
  <rect x="230" y="50" width="160" height="36" rx="5" fill="#1a2030" stroke="#7ee787" stroke-width="1.5"/>
  <text x="310" y="65" font-family="monospace" font-size="11" fill="#7ee787" text-anchor="middle">CodeQL</text>
  <text x="310" y="79" font-family="monospace" font-size="10" fill="#5a8a5a" text-anchor="middle">semantic code analysis</text>
  <!-- Secret scanning -->
  <rect x="230" y="100" width="160" height="36" rx="5" fill="#1a2030" stroke="#e8c53a" stroke-width="1.5"/>
  <text x="310" y="115" font-family="monospace" font-size="11" fill="#e8c53a" text-anchor="middle">Secret Scanning</text>
  <text x="310" y="129" font-family="monospace" font-size="10" fill="#8a7a3a" text-anchor="middle">credential leak detection</text>
  <!-- Dependabot -->
  <rect x="230" y="150" width="160" height="36" rx="5" fill="#1a2030" stroke="#3498db" stroke-width="1.5"/>
  <text x="310" y="165" font-family="monospace" font-size="11" fill="#7eb3f5" text-anchor="middle">Dependabot</text>
  <text x="310" y="179" font-family="monospace" font-size="10" fill="#3a6a8a" text-anchor="middle">supply chain security</text>
  <!-- OWASP panel -->
  <rect x="430" y="40" width="320" height="220" rx="8" fill="#0d1117" stroke="#e74c3c" stroke-width="1.5" opacity="0.8"/>
  <text x="590" y="68" font-family="monospace" font-size="13" fill="#e07b7b" text-anchor="middle">OWASP Juice Shop</text>
  <text x="590" y="88" font-family="monospace" font-size="11" fill="#5a3a3a" text-anchor="middle">intentionally vulnerable app</text>
  <!-- Vulnerability findings -->
  <text x="450" y="118" font-family="monospace" font-size="11" fill="#e07b7b">● SQL Injection</text>
  <text x="450" y="138" font-family="monospace" font-size="11" fill="#e8c53a">● XSS</text>
  <text x="450" y="158" font-family="monospace" font-size="11" fill="#e8c53a">● Broken Auth</text>
  <text x="600" y="118" font-family="monospace" font-size="11" fill="#7ee787">✓ detected</text>
  <text x="600" y="138" font-family="monospace" font-size="11" fill="#7ee787">✓ detected</text>
  <text x="600" y="158" font-family="monospace" font-size="11" fill="#7ee787">✓ detected</text>
  <text x="450" y="195" font-family="monospace" font-size="10" fill="#5a7a9a">GitHub Actions CI/CD</text>
  <text x="450" y="213" font-family="monospace" font-size="10" fill="#5a7a9a">Compliance workflows</text>
  <text x="400" y="332" font-family="monospace" font-size="13" fill="#f0883e" text-anchor="middle" opacity="0.8">CodeQL · Secret Scanning · Dependabot · OWASP · GitHub Actions</text>
</svg>
