<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg_kg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1825;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg_kg)"/>
  <!-- Kaggle K logo simplified -->
  <text x="80" y="160" font-family="Arial Black,sans-serif" font-size="120" font-weight="900" fill="#20beff" opacity="0.15" text-anchor="middle">K</text>
  <!-- Competition cards -->
  <rect x="40" y="40" width="220" height="65" rx="6" fill="#0f2030" stroke="#20beff" stroke-width="1.5"/>
  <text x="55" y="63" font-family="monospace" font-size="11" fill="#20beff">NeurIPS 2025 Polymers</text>
  <text x="55" y="80" font-family="monospace" font-size="10" fill="#7eb3f5">SMILES · RDKit · ChemBERT</text>
  <text x="245" y="97" font-family="monospace" font-size="10" fill="#5a7a9a" text-anchor="end">NLP+Chemistry</text>

  <rect x="40" y="120" width="220" height="65" rx="6" fill="#0f2030" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="55" y="143" font-family="monospace" font-size="11" fill="#e07b7b">House Prices Ensemble</text>
  <text x="55" y="160" font-family="monospace" font-size="10" fill="#aaa">stacking · gradient boost</text>
  <text x="245" y="177" font-family="monospace" font-size="10" fill="#e07b7b" text-anchor="end">Rank #363</text>

  <rect x="40" y="200" width="220" height="65" rx="6" fill="#0f2030" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="55" y="223" font-family="monospace" font-size="11" fill="#c97bff">SimCLR on Titanic</text>
  <text x="55" y="240" font-family="monospace" font-size="10" fill="#aaa">self-supervised contrastive</text>
  <text x="245" y="257" font-family="monospace" font-size="10" fill="#9b59b6" text-anchor="end">CV on tabular</text>

  <!-- Right panel -->
  <rect x="310" y="40" width="220" height="65" rx="6" fill="#0f2030" stroke="#27ae60" stroke-width="1.5"/>
  <text x="325" y="63" font-family="monospace" font-size="11" fill="#5ba85a">HCT Survival Analysis</text>
  <text x="325" y="80" font-family="monospace" font-size="10" fill="#aaa">equity-aware C-Index</text>
  <text x="525" y="97" font-family="monospace" font-size="10" fill="#5ba85a" text-anchor="end">0.6766 CV</text>

  <rect x="310" y="120" width="220" height="65" rx="6" fill="#0f2030" stroke="#e8c53a" stroke-width="1.5"/>
  <text x="325" y="143" font-family="monospace" font-size="11" fill="#e8c53a">PINNs</text>
  <text x="325" y="160" font-family="monospace" font-size="10" fill="#aaa">physics-informed neural nets</text>
  <text x="525" y="177" font-family="monospace" font-size="10" fill="#e8c53a" text-anchor="end">PDEs</text>

  <!-- Score/medal area -->
  <circle cx="660" cy="130" r="60" fill="#0f2030" stroke="#20beff" stroke-width="2" opacity="0.8"/>
  <text x="660" y="120" font-family="monospace" font-size="12" fill="#20beff" text-anchor="middle">5+</text>
  <text x="660" y="138" font-family="monospace" font-size="12" fill="#7eb3f5" text-anchor="middle">competitions</text>
  <text x="660" y="156" font-family="monospace" font-size="11" fill="#aaa" text-anchor="middle">notebooks</text>

  <text x="400" y="332" font-family="monospace" font-size="13" fill="#20beff" text-anchor="middle" opacity="0.8">Python · XGBoost · scikit-learn · RDKit · PyTorch · Kaggle</text>
</svg>
