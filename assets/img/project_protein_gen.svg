<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg_pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a44;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg_pg)"/>
  <!-- Protein helix (left) -->
  <path d="M80,60 C120,60 120,100 80,100 C40,100 40,140 80,140 C120,140 120,180 80,180 C40,180 40,220 80,220 C120,220 120,260 80,260" fill="none" stroke="#3498db" stroke-width="3" opacity="0.8"/>
  <path d="M80,60 C40,60 40,100 80,100 C120,100 120,140 80,140 C40,140 40,180 80,180 C120,180 120,220 80,220 C40,220 40,260 80,260" fill="none" stroke="#9b59b6" stroke-width="3" opacity="0.6"/>
  <!-- Nodes on helix -->
  <circle cx="80" cy="60" r="5" fill="#3498db"/>
  <circle cx="80" cy="100" r="5" fill="#9b59b6"/>
  <circle cx="80" cy="140" r="5" fill="#3498db"/>
  <circle cx="80" cy="180" r="5" fill="#9b59b6"/>
  <circle cx="80" cy="220" r="5" fill="#3498db"/>
  <circle cx="80" cy="260" r="5" fill="#9b59b6"/>
  <!-- Three model tracks -->
  <rect x="200" y="50" width="500" height="60" rx="6" fill="#0d1a2e" stroke="#3498db" stroke-width="1.5"/>
  <text x="220" y="72" font-family="monospace" font-size="12" fill="#7eb3f5">ASYM-VAE</text>
  <text x="220" y="90" font-family="monospace" font-size="10" fill="#5a7a9a">Asymmetric variational autoencoder · conditional generation</text>
  <rect x="200" y="125" width="500" height="60" rx="6" fill="#0d1a2e" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="220" y="147" font-family="monospace" font-size="12" fill="#c97bff">GRAN</text>
  <text x="220" y="165" font-family="monospace" font-size="10" fill="#7a5a9a">Graph Recurrent Attention Network · dual generative model</text>
  <rect x="200" y="200" width="500" height="60" rx="6" fill="#0d1a2e" stroke="#27ae60" stroke-width="1.5"/>
  <text x="220" y="222" font-family="monospace" font-size="12" fill="#5ba85a">GNN Classifier</text>
  <text x="220" y="240" font-family="monospace" font-size="10" fill="#3a7a3a">SCOP database · graph neural network · structure classification</text>
  <!-- pH label -->
  <text x="660" y="85" font-family="monospace" font-size="11" fill="#3498db">conditional</text>
  <text x="660" y="99" font-family="monospace" font-size="11" fill="#3498db">pH gen</text>
  <text x="400" y="332" font-family="monospace" font-size="13" fill="#7eb3f5" text-anchor="middle" opacity="0.8">PyTorch · PyTorch Geometric · VAE · GRAN · GNN · SCOP</text>
</svg>
