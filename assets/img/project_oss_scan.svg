<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg_oss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a2a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg_oss)"/>
  <!-- CI pipeline flow -->
  <rect x="40" y="130" width="100" height="40" rx="5" fill="#1a2a2a" stroke="#7eb3f5" stroke-width="1.5"/>
  <text x="90" y="155" font-family="monospace" font-size="11" fill="#7eb3f5" text-anchor="middle">git push</text>
  <line x1="140" y1="150" x2="170" y2="150" stroke="#7eb3f5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="170" y="130" width="110" height="40" rx="5" fill="#1a2a2a" stroke="#f0883e" stroke-width="1.5"/>
  <text x="225" y="155" font-family="monospace" font-size="11" fill="#f0883e" text-anchor="middle">GH Actions</text>
  <line x1="280" y1="150" x2="310" y2="150" stroke="#f0883e" stroke-width="1.5"/>

  <!-- Semgrep box -->
  <rect x="310" y="80" width="120" height="50" rx="5" fill="#1a2a2a" stroke="#27ae60" stroke-width="2"/>
  <text x="370" y="102" font-family="monospace" font-size="12" fill="#5ba85a" text-anchor="middle">Semgrep</text>
  <text x="370" y="120" font-family="monospace" font-size="10" fill="#3a6a3a" text-anchor="middle">SAST</text>
  <!-- FOSSA box -->
  <rect x="310" y="185" width="120" height="50" rx="5" fill="#1a2a2a" stroke="#9b59b6" stroke-width="2"/>
  <text x="370" y="207" font-family="monospace" font-size="12" fill="#c97bff" text-anchor="middle">FOSSA</text>
  <text x="370" y="225" font-family="monospace" font-size="10" fill="#7a5a9a" text-anchor="middle">Licence Scan</text>
  <!-- Lines from GH Actions -->
  <line x1="280" y1="140" x2="310" y2="110" stroke="#27ae60" stroke-width="1.5" opacity="0.8"/>
  <line x1="280" y1="160" x2="310" y2="205" stroke="#9b59b6" stroke-width="1.5" opacity="0.8"/>

  <!-- Results -->
  <rect x="470" y="80" width="140" height="50" rx="5" fill="#1a2a2a" stroke="#27ae60" stroke-width="1.5"/>
  <text x="540" y="102" font-family="monospace" font-size="11" fill="#5ba85a" text-anchor="middle">0 high vulns</text>
  <text x="540" y="120" font-family="monospace" font-size="10" fill="#3a6a3a" text-anchor="middle">SAST clean ✓</text>
  <rect x="470" y="185" width="140" height="50" rx="5" fill="#1a2a2a" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="540" y="207" font-family="monospace" font-size="11" fill="#c97bff" text-anchor="middle">MIT / Apache</text>
  <text x="540" y="225" font-family="monospace" font-size="10" fill="#7a5a9a" text-anchor="middle">licences OK ✓</text>

  <line x1="430" y1="105" x2="470" y2="105" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="430" y1="210" x2="470" y2="210" stroke="#9b59b6" stroke-width="1.5"/>

  <!-- Badge -->
  <rect x="650" y="120" width="110" height="60" rx="6" fill="#1a2a2a" stroke="#7eb3f5" stroke-width="1.5"/>
  <text x="705" y="148" font-family="monospace" font-size="12" fill="#5ba85a" text-anchor="middle">passing</text>
  <text x="705" y="168" font-family="monospace" font-size="10" fill="#7eb3f5" text-anchor="middle">CI / CD</text>

  <text x="400" y="332" font-family="monospace" font-size="13" fill="#27ae60" text-anchor="middle" opacity="0.8">Semgrep SAST · FOSSA Licence Scan · GitHub Actions · CI/CD</text>
</svg>
